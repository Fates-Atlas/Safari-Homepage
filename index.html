<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Homepage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Layer (Fixes fixed positioning issues) -->
    <div id="background-layer"></div>

    <!-- Top Section: Time & Search -->
    <div id="time-date-container">
        <div id="date-widget"></div>
        <div id="time-widget"></div>
        <div id="header-weather">
            <div id="weather-temp" style="font-size: 1.5em; font-weight: bold;">--°</div>
            <img id="weather-icon" src="" alt="Weather Icon" style="display:none; width: 40px; height: 40px;">
            <div id="weather-desc">Loading...</div>
        </div>
    </div>

    <div id="search-container">
        <form action="https://www.google.com/search" method="get" id="search-form">
            <input type="text" name="q" id="search-input" placeholder="Search..." autofocus autocomplete="off">
            <div id="search-suggestions" class="hidden"></div>
        </form>
    </div>

    <!-- Dashboard Grid (Widgets) -->
    <div id="dashboard-grid">
        
        <!-- Calendar Widget (Top Left) -->
        <div class="widget-container" id="calendar-widget">
            <div id="calendar-grid-container" style="height: 100%; display: flex; flex-direction: column; width: 100%;">
                <div class="calendar-header">
                    <button class="calendar-nav" id="prev-month">&lt;</button>
                    <span id="calendar-month-year"></span>
                    <button class="calendar-nav" id="next-month">&gt;</button>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>
            <div id="calendar-embed-container" class="hidden"></div>
        </div>

        <!-- Stocks Widget (Top Right) -->
        <div class="widget-container" id="stocks-widget">
            <div id="tradingview-widget-container" class="stocks-vertical-layout"></div>
        </div>

        <!-- News Widget (Bottom Full Width) -->
        <div class="widget-container" id="news-widget">
            <iframe id="news-frame" src="about:blank" style="width:100%; height:100%; border:none; border-radius: 5px;"></iframe>
        </div>
    
    </div>

    <!-- Settings Icon -->
    <div id="settings-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="28px" height="28px"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.69-1.62-0.92L14.4,2.27C14.38,2.04,14.17,1.88,13.92,1.88h-3.84 c-0.25,0-0.46,0.16-0.48,0.39L9.19,4.63c-0.59,0.23-1.12,0.54-1.62,0.92L5.18,4.57C4.95,4.49,4.7,4.56,4.59,4.78L2.67,8.1 c-0.11,0.2-0.06,0.47,0.12,0.61l2.03,1.58C4.74,10.72,4.73,11.04,4.73,11.35c0,0.31,0.01,0.63,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.69,1.62,0.92L9.6,21.73 c0.02,0.23,0.23,0.39,0.48,0.39h3.84c0.25,0,0.46-0.16,0.48-0.39l0.39-2.36c0.59-0.23,1.12-0.54,1.62-0.92l2.39,0.96 c0.22,0.08,0.47,0.01,0.59-0.22l1.92-3.32c0.11-0.2,0.06-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
    </div>

    <!-- Settings Panel (Hidden by default) -->
    <div id="settings-modal" class="hidden">
        <div class="settings-section">
            <h3>Background</h3>
            
            <div class="setting">
                <label for="accent-color-picker">Accent Color:</label>
                <input type="color" id="accent-color-picker" value="#4285F4">
            </div>
            
            <div id="bg-selector-container">
                <div class="selector-header">
                    <label>Select Image</label>
                    <button id="toggle-bg-view">Expand</button>
                </div>

                <div id="bg-list">
                    <!-- Javascript will populate this -->
                </div>

                <!-- Hidden Input Area for Custom Image -->
                <div id="custom-bg-input" class="hidden">
                    <div class="setting">
                        <label>Type:</label>
                        <input type="file" id="file-upload" accept="image/*">
                    </div>
                    <div class="setting">
                        <label>Or URL:</label>
                        <input type="text" id="custom-url-input" placeholder="Paste link here...">
                    </div>
                    <button id="save-custom-bg" style="width:100%; padding: 5px; cursor:pointer; background: #4285F4; color: white; border: none; border-radius: 4px;">Add to Library</button>
                </div>
                <div id="bg-edit-mode-controls" class="hidden">
                    <button id="exit-edit-mode">Done</button>
                </div>
            </div>
            
            <div class="setting" style="margin-top: 15px;">
                <label for="bg-blur">Blur:</label>
                <input type="range" id="bg-blur" min="0" max="20" value="0">
            </div>
        </div>
        <div style="font-size: 0.7em; color: #888; text-align: center; margin-top: -15px; margin-bottom: 15px;">
            Max 20 custom images. 
            <span class="help-icon" data-tooltip="Hold click on an image for 1 second to enter edit mode and delete images.">?</span>
        </div>

        <div class="settings-section">
            <h3>Clock</h3>
            <div class="setting">
                <label for="time-color-picker">Color Gradient:</label>
                <input type="color" id="time-color-picker" value="#ffffff">
                <input type="color" id="time-color-mid-picker" value="#ffffff" style="margin-left: 5px;">
                <input type="color" id="time-color-end-picker" value="#ffffff" style="margin-left: 5px;">
            </div>
            <div class="setting">
                <label for="time-gradient-toggle">Enable Gradient</label>
                <input type="checkbox" id="time-gradient-toggle">
            </div>
            <div class="setting">
                <label for="time-liquid-toggle">Liquid Glass Background</label>
                <input type="checkbox" id="time-liquid-toggle">
            </div>
            <div class="setting">
                <label for="clock-scale-slider">Size</label>
                <input type="range" id="clock-scale-slider" min="0.5" max="3" step="0.1" value="1">
            </div>
            <div class="setting">
                 <label for="time-format">24-Hour Clock</label>
                 <input type="checkbox" id="time-format">
            </div>
        </div>

        <div class="settings-section">
            <h3>Widgets</h3>
            
            <div class="setting">
                <label>Visibility:</label>
                <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-size: 0.9em;"><input type="checkbox" id="toggle-calendar" checked> Calendar</label>
                    <label style="font-size: 0.9em;"><input type="checkbox" id="toggle-weather" checked> Weather</label>
                    <label style="font-size: 0.9em;"><input type="checkbox" id="toggle-stocks" checked> Stocks</label>
                    <label style="font-size: 0.9em;"><input type="checkbox" id="toggle-news" checked> News</label>
                </div>
            </div>
            
            <div class="setting">
                <label for="font-family-select">Font:</label>
                <select id="font-family-select">
                    <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">San Francisco (Default)</option>
                    <option value="'New York', 'Times New Roman', serif">New York (Serif)</option>
                    <option value="'Courier New', Courier, monospace">Monospace</option>
                    <option value="'Arial Rounded MT Bold', Arial, sans-serif">Rounded</option>
                </select>
            </div>

            <div class="setting">
                <label for="widget-opacity">Transparency:</label>
                <input type="range" id="widget-opacity" min="0" max="1" step="0.1" value="0.5">
            </div>
            
            <div class="setting">
                <label>Theme:</label>
                <div style="flex: 1; display: flex; align-items: center; gap: 10px;">
                     <label style="font-size: 0.9em;"><input type="checkbox" id="liquid-glass-toggle"> Liquid Glass</label>
                </div>
            </div>

            <div class="setting">
                <label for="widget-color-picker">Gradient Colors:</label>
                <input type="color" id="widget-color-picker" value="#000000">
                <input type="color" id="widget-color-mid-picker" value="#000000" style="margin-left: 5px;">
                <input type="color" id="widget-gradient-picker" value="#000000" style="margin-left: 5px;">
            </div>
            
            <div id="widget-color-swatches">
                <!-- JS will generate swatches here -->
            </div>
        </div>

        <div class="settings-section">
            <h3>Preferences</h3>
            <div class="setting">
                <label for="search-engine">Search Engine:</label>
                <select id="search-engine">
                    <option value="google">Google</option>
                    <option value="bing">Bing</option>
                    <option value="duckduckgo">DuckDuckGo</option>
                    <option value="yahoo">Yahoo</option>
                    <option value="ecosia">Ecosia</option>
                </select>
            </div>
            <div class="setting">
                <label for="calendar-provider">Calendar:</label>
                <select id="calendar-provider">
                    <option value="apple">Apple Calendar</option>
                    <option value="google">Google Calendar</option>
                </select>
            </div>
            <div class="setting">
                <label for="calendar-mode">Calendar Type:</label>
                <select id="calendar-mode">
                    <option value="grid">Simple Grid</option>
                    <option value="embed">Embed Widget</option>
                </select>
            </div>
            <div class="setting" id="calendar-url-setting">
                <label for="calendar-url">Embed Code / URL
                    <span id="calendar-help-icon" class="help-icon" data-tooltip="Paste the HTML embed code from Google Calendar or a public URL.">?</span>
                </label>
                <input type="text" id="calendar-url" placeholder="<iframe src='...'> or https://...">
            </div>
            
            <div class="setting">
                <label for="stock-symbol">Stocks (comma separated):</label>
                <input type="text" id="stock-symbol" placeholder="AAPL, TSLA, BTCUSD">
            </div>
             <div class="setting">
                <label for="news-url">News URL:</label>
                <input type="text" id="news-url" placeholder="Embeddable URL...">
            </div>
            <div class="setting">
                <label for="temp-unit-toggle">Use Celsius</label>
                <input type="checkbox" id="temp-unit-toggle">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
